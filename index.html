<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Clann's Tech Space </title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body class="home-page">
        <header>
            <div class="header-inner">
                <h1> CLANN'S TECH SPACE </h1>
                <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
                <label for="nav-toggle" class="nav-toggle-label" aria-hidden="true"><span class="hamburger"></span></label>
                <nav class="nav-links" aria-label="Main navigation">
                    <a href="index.html" class="active"><i class="bi bi-house"> </i> HOME</a>
                    <a href="project.html"><i class="bi bi-code-square"> </i> PROJECTS</a>
                    <a href="about-me.html" style="border-right: none;"><i class="bi bi-person-square"> </i> ABOUT ME</a>
                </nav>
                <input type="checkbox" id="dark-mode-toggle" class="dark-mode-toggle" aria-hidden="true">
                <label for="dark-mode-toggle" class="dark-mode-label" title="Toggle dark mode" aria-label="Toggle dark mode"><i class="bi bi-moon-stars"></i></label>
            </div>
        </header>
        <main class="home-main">
            <div class="hero-left">
                <h1> Hello! I'm Clann </h1>
                <p> I'm exploring the world of ICT as a Grade 11 student, and 
                    this portfolio is my space to showcase my journey, projects, 
                    and dreams for the future. </p>
                <a class="btn-contact" href="about-me.html"><i class="bi bi-telephone"> </i> Get In Touch!</a>
            </div>
            <div class="hero-right">
                <img src="img/clann-anime.png" alt="Clann Daniel">
            </div>
        </main>
        <footer class="site-footer">
            <div class="footer-inner">
                <p style="margin:0; font-weight:600;"><i class="bi bi-c-circle"></i> 2025 Clann Daniel R. Del Rosario — <i class="bi bi-at"></i>clanndlrsr</p>
            </div>
        </footer>

        <script>
            // Dark mode toggle functionality
            const darkModeToggle = document.getElementById('dark-mode-toggle');
            const darkModeLabel = document.querySelector('.dark-mode-label');
            const body = document.body;

            // Check for saved dark mode preference or default to false
            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            if (isDarkMode) {
                body.classList.add('dark-mode');
                darkModeToggle.checked = true;
                updateDarkModeIcon();
            }

            // Toggle dark mode
            darkModeToggle.addEventListener('change', function() {
                body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', body.classList.contains('dark-mode'));
                updateDarkModeIcon();
            });

            // Update icon based on dark mode state
            function updateDarkModeIcon() {
                const icon = darkModeLabel.querySelector('i');
                if (body.classList.contains('dark-mode')) {
                    icon.className = 'bi bi-sun-fill';
                    darkModeLabel.title = 'Toggle light mode';
                } else {
                    icon.className = 'bi bi-moon-stars';
                    darkModeLabel.title = 'Toggle dark mode';
                }
            }
        </script>
    </body>
</html>
